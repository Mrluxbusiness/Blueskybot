name: 🤖 Bluesky Course Marketing Poster

on:
  schedule:
    # USA Eastern Time (EST = UTC-5 / EDT = UTC-4)
    # প্রতিদিন ৩ বার — 80/20 Value-First Strategy
    - cron: '0 13 * * *'   # Slot 1: USA EST 08:00 AM  ☀️ Morning (Value Post)
    - cron: '0 18 * * *'   # Slot 2: USA EST 01:00 PM  🍔 Afternoon (Curiosity/Proof)
    - cron: '0 0  * * *'   # Slot 3: USA EST 07:00 PM  🌆 Evening (Offer/Engagement)

  # হাতে চালাতে চাইলে
  workflow_dispatch:
    inputs:
      time_slot:
        description: 'Time slot (1=Morning Value, 2=Afternoon Curiosity, 3=Evening Offer)'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
      run_reason:
        description: 'Manual run কারণ'
        required: false
        default: 'Test run'

jobs:
  post-to-bluesky:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 🔤 Install Fonts (Poppins)
        run: |
          sudo mkdir -p /usr/share/fonts/truetype/google-fonts
          wget -q -O /tmp/Poppins-Bold.ttf "https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-Bold.ttf"
          wget -q -O /tmp/Poppins-Regular.ttf "https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-Regular.ttf"
          sudo cp /tmp/Poppins-Bold.ttf /usr/share/fonts/truetype/google-fonts/
          sudo cp /tmp/Poppins-Regular.ttf /usr/share/fonts/truetype/google-fonts/
          fc-cache -f

      - name: 📦 Install dependencies
        run: pip install requests pillow openai

      - name: 🕐 Determine Time Slot
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SLOT="${{ github.event.inputs.time_slot }}"
          else
            HOUR=$(TZ='America/New_York' date '+%H')
            if [ "$HOUR" -lt 11 ]; then
              SLOT="1"
            elif [ "$HOUR" -lt 16 ]; then
              SLOT="2"
            else
              SLOT="3"
            fi
          fi
          echo "time_slot=$SLOT" >> $GITHUB_OUTPUT
          echo "🕐 Time Slot: $SLOT"

      - name: 🚀 Run Course Marketing Poster
        env:
          NVIDIA_API_KEY:    ${{ secrets.NVIDIA_API_KEY }}
          TIKTOK_COURSE_URL: ${{ secrets.TIKTOK_COURSE_URL }}
          TIME_SLOT:         ${{ steps.slot.outputs.time_slot }}

          BSKY_HANDLE_1:       ${{ secrets.BSKY_HANDLE_1 }}
          BSKY_PASSWORD_1:     ${{ secrets.BSKY_PASSWORD_1 }}

          BSKY_HANDLE_2:       ${{ secrets.BSKY_HANDLE_2 }}
          BSKY_PASSWORD_2:     ${{ secrets.BSKY_PASSWORD_2 }}

          BSKY_HANDLE_3:       ${{ secrets.BSKY_HANDLE_3 }}
          BSKY_PASSWORD_3:     ${{ secrets.BSKY_PASSWORD_3 }}

          BSKY_HANDLE_4:       ${{ secrets.BSKY_HANDLE_4 }}
          BSKY_PASSWORD_4:     ${{ secrets.BSKY_PASSWORD_4 }}

          BSKY_HANDLE_5:       ${{ secrets.BSKY_HANDLE_5 }}
          BSKY_PASSWORD_5:     ${{ secrets.BSKY_PASSWORD_5 }}

        run: python post.py

      - name: 📊 Summary
        if: always()
        run: |
          echo "## 📱 Bluesky Course Marketing Poster" >> $GITHUB_STEP_SUMMARY
          echo "- **UTC Time:** $(date '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
          echo "- **USA EST:** $(TZ='America/New_York' date '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
          echo "- **Time Slot:** ${{ steps.slot.outputs.time_slot }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Day:** $(TZ='America/New_York' date '+%A')" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
